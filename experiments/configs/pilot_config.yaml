# Pilot Study Configuration
# CGT-Informed Neural Networks for Multi-Heap Nim

experiment:
  name: "nim_pilot_v1"
  seeds: [42, 123, 456, 789, 1024]
  results_dir: "results"

data:
  max_pad_heaps: 6
  train_heap_counts: [2, 3]
  train_heap_range: [0, 7]
  ood_heap_counts: [4, 5, 6]
  ood_size_range: [8, 15]
  train_val_test_split: [0.7, 0.15, 0.15]
  ood_sample_limit: 10000

models:
  mlp:
    hidden_units: 128
    n_hidden: 3
    dropout_rate: 0.2

  deepsets:
    phi_units: 64
    phi_layers: 2
    rho_units: 64
    rho_layers: 2
    dropout_rate: 0.2

  cgt_net:
    embed_dim: 16
    encoder_units: 64
    encoder_layers: 2
    max_grundy: 16
    dropout_rate: 0.2
    grundy_loss_weight: 0.3

  dqn:
    hidden_units: 128
    lr: 0.001
    gamma: 0.99
    epsilon_start: 1.0
    epsilon_end: 0.05
    epsilon_decay: 0.995
    buffer_size: 10000
    batch_size: 64
    target_update_freq: 100
    n_episodes: 50000

training:
  learning_rate: 0.001
  batch_size: 256
  max_epochs: 100
  patience: 10
